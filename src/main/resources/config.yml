# ====================================
# AnimalWhistle Plugin Configuration
# ====================================

# Item path (from MMOItems)
items:
  animal-whistle: "m.pets.animal_whistle"

# Feature settings
settings:
  detection-radius: 50.0    # Radius in blocks to detect animals
  glow-duration: 5          # Duration in seconds for the glowing effect
  whitelisted-animals:      # Entity types that will be highlighted (use Bukkit EntityType names)
    - HORSE
    - DONKEY
    - MULE
    - LLAMA
    - TRADER_LLAMA

# Sound settings
sound:
  type: "BLOCK_NOTE_BLOCK_FLUTE"    # Sound to play when whistle is used
  volume: 1.0                       # Volume of the sound (0.0 - 1.0+)
  pitch: 1.5                        # Pitch of the sound (0.5 - 2.0)